<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PoseGuide - AR 攝影師模式</title>
  <link rel="manifest" href="./manifest.json">
  
  <!-- 引入 TFJS 與 MoveNet (處理骨架) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  
  <!-- 引入超強前端去背引擎 Img.ly Background Removal -->
  <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/imglyRemoveBackground.umd.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; background: #111; overflow: hidden; color: white; }
    #video, #output { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; display: none; }
    #output { z-index: 1; touch-action: none; }
    
    #upload-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 20;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    }
    #upload-screen h1 { margin-bottom: 30px; font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    #upload-label {
      background: white; color: #007bff; padding: 15px 40px; border-radius: 50px;
      font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    input[type="file"] { display: none; }
    #idol-img { display: none; }

    .btn-container {
      position: fixed; z-index: 10; bottom: 30px; left: 0; width: 100%;
      display: flex; justify-content: center; gap: 15px; padding: 0 15px; box-sizing: border-box;
    }
    button { 
      padding: 15px 25px; background: #007bff; color: white; border: none; 
      border-radius: 50px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #takePhotoBtn { background: #e83e8c; display: none; }
    #cancelBtn { background: #6c757d; display: none; }
    
    #status { 
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; 
      background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 14px; white-space: nowrap; pointer-events: none;
    }
    #flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.1s; }

    #preview-modal {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 10000; 
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    #preview-img { max-width: 90%; max-height: 70vh; border: 3px solid white; border-radius: 10px; object-fit: contain; }
    .preview-btns { margin-top: 20px; display: flex; gap: 20px; }
    #saveBtn { background: #28a745; padding: 15px 30px; font-size: 18px; }
    #retryBtn { background: #dc3545; padding: 15px 30px; font-size: 18px; }
  </style>
</head>
<body>
  <div id="upload-screen">
    <h1>與偶像同框 AR (攝影師版)</h1>
    <p id="loading-msg">⏳ 正在下載 AI 模組...</p>
    <label id="upload-label" style="display:none;">
      選擇偶像照片
      <input type="file" id="file-input" accept="image/*">
    </label>
  </div>

  <div id="status" style="display:none;">載入中...</div>
  <div id="flash"></div>
  
  <img id="idol-img" crossorigin="anonymous">
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="output"></canvas>
  
  <div class="btn-container">
    <button id="cancelBtn">重選照片</button>
    <button id="takePhotoBtn">📸 立即拍照</button>
  </div>

  <div id="preview-modal">
    <img id="preview-img" src="" alt="Photo Preview">
    <div class="preview-btns">
      <button id="retryBtn">捨棄</button>
      <button id="saveBtn">儲存相片</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
