<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoseGuide PWA - Camera</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; font-family: sans-serif; background: #000; }
    #video, #output { 
      position: fixed; top: 0; left: 0; 
      width: 100vw; height: 100vh; 
      object-fit: cover; 
    }
    #output { z-index: 1; }
    button { 
      position: fixed; z-index: 10; 
      bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 15px 40px; margin: 10px; 
      background: #007bff; color: white; border: none; 
      border-radius: 50px; font-size: 18px; min-width: 120px;
    }
    button:disabled { background: #666; }
    #status { position: fixed; top: 20px; left: 20px; color: white; z-index: 10; }
  </style>
</head>
<body>
  <div id="status">準備啟動</div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="output"></canvas>
  <button id="start">啟動相機</button>
  <button id="capture1" disabled>拍第一張（背景）</button>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
