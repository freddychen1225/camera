<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PoseGuide PWA - 多人引導</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23007bff'>📸</text></svg>">
  
  <!-- 引入 TensorFlow.js 和 Pose Detection 模組 -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body { margin: 0; font-family: sans-serif; background: #000; overflow: hidden; }
    #video, #output { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; display: none; }
    #output { z-index: 1; }
    
    .btn-container {
      position: fixed; z-index: 10; bottom: 30px; left: 0; width: 100%;
      display: flex; justify-content: center; gap: 15px; padding: 0 15px; box-sizing: border-box;
    }
    button { 
      padding: 12px 20px; background: #007bff; color: white; border: none; 
      border-radius: 50px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      white-space: nowrap;
    }
    button:disabled { background: #555; color: #999; }
    #guideBtn { background: #28a745; display: none; }
    
    #status { 
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: white; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px;
      font-size: 14px; white-space: nowrap; pointer-events: none;
    }
    #match-score {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      color: white; z-index: 10; background: rgba(255,165,0,0.8); padding: 8px 16px; border-radius: 20px;
      font-size: 16px; font-weight: bold; display: none; pointer-events: none;
    }
    #flash {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: white; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.1s;
    }

    #preview-modal {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.9); z-index: 10000; display: none;
      flex-direction: column; align-items: center; justify-content: center;
    }
    #preview-img { max-width: 90%; max-height: 70vh; border: 3px solid white; border-radius: 10px; object-fit: contain; }
    .preview-btns { margin-top: 20px; display: flex; gap: 20px; }
    #saveBtn { background: #28a745; padding: 15px 30px; font-size: 18px; }
    #retryBtn { background: #dc3545; padding: 15px 30px; font-size: 18px; }
  </style>
</head>
<body>
  <div id="status">正在下載 TFJS MoveNet 多人模組...</div>
  <div id="match-score">匹配度: 0%</div>
  <div id="flash"></div>
  
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="output"></canvas>
  
  <div class="btn-container">
    <button id="start" disabled>等待載入...</button>
    <button id="capture1" disabled>鎖定背景與姿勢</button>
    <button id="guideBtn">進入引導模式</button>
  </div>

  <div id="preview-modal">
    <img id="preview-img" src="" alt="Photo Preview">
    <div class="preview-btns">
      <button id="retryBtn">取消</button>
      <button id="saveBtn">儲存至相簿</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.error);
  </script>
  <!-- 注意：改回一般的 script，不再使用 module -->
  <script src="./app.js"></script>
</body>
</html>
