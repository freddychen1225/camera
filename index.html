<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PoseGuide PWA - 姿態引導</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23007bff'>📸</text></svg>">
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; font-family: sans-serif; background: #000; overflow: hidden; }
    #video, #output { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; display: none; }
    #output { z-index: 1; }
    
    .btn-container {
      position: fixed; z-index: 10; bottom: 30px; left: 0; width: 100%;
      display: flex; justify-content: center; gap: 10px;
    }
    button { 
      padding: 15px 25px; background: #007bff; color: white; border: none; 
      border-radius: 50px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    button:disabled { background: #555; color: #999; }
    #guideBtn { background: #28a745; display: none; } /* 綠色引導按鈕 */
    
    #status { 
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: white; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px;
      font-size: 14px; white-space: nowrap; pointer-events: none;
    }
    #match-score {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      color: white; z-index: 10; background: rgba(255,165,0,0.8); padding: 10px 20px; border-radius: 20px;
      font-size: 18px; font-weight: bold; display: none; pointer-events: none;
    }
    
    /* 拍照閃爍特效 */
    #flash {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: white; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.1s;
    }
  </style>
</head>
<body>
  <div id="status">準備啟動 AI 相機</div>
  <div id="match-score">匹配度: 0%</div>
  <div id="flash"></div>
  
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="output"></canvas>
  
  <div class="btn-container">
    <button id="start">啟動相機</button>
    <button id="capture1" disabled>鎖定完美姿勢</button>
    <button id="guideBtn">進入引導模式</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.error);
  </script>
  <script src="./app.js"></script>
</body>
</html>
